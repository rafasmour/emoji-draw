x-php-build: &php-build
  build:
    context: .
    dockerfile: ./docker/common/php-fpm/Dockerfile
    target: production
  depends_on:
    mongodb:
      condition: service_healthy

services:
  web:
    build:
      context: .
      dockerfile: ./docker/production/nginx/Dockerfile
    restart: unless-stopped
    volumes:
      - laravel-storage-production:/var/www/storage:ro
      - laravel-public-assets:/var/www/public/build:ro
    networks:
      - webgateway
    ports:
      - "${NGINX_PORT:-80}:80"
    labels:
      - traefik.enable=true
      - traefik.http.routers.web.rule=Host(`emoji-draw.${DOMAIN}`)
      - traefik.http.routers.web.entrypoints=websecure
      - traefik.http.routers.web.tls=true
      - traefik.http.routers.web.priority=1
    depends_on:
      php-fpm:
        condition: service_healthy

  php-fpm:
    <<: *php-build
    restart: unless-stopped
    volumes:
      - laravel-public-assets:/var/www/public/build
      - laravel-storage-production:/var/www/storage
    env_file:
      - .env
    networks:
      - webgateway
    healthcheck:
      test: ["CMD-SHELL", "php-fpm-healthcheck || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  reverb:
    <<: *php-build
    restart: unless-stopped
    command: php artisan reverb:start
    env_file:
      - .env
    ports:
      - "8080"
    networks:
      - webgateway
    labels:
      - traefik.enable=true
      - traefik.http.routers.reverb.rule=Host(`emoji-draw.${DOMAIN}`) && PathPrefix(`/app`)
      - traefik.http.routers.reverb.priority=10
      - traefik.http.routers.reverb.entrypoints=websecure
      - traefik.http.routers.reverb.tls=true
      - traefik.http.services.reverb.loadbalancer.server.port=8080
      - traefik.docker.network=webgateway
    depends_on:
      mongodb:
        condition: service_healthy

  queue:
    <<: *php-build
    restart: unless-stopped
    command: php artisan queue:listen --tries=3
    env_file:
      - .env
    networks:
      - webgateway
    depends_on:
      mongodb:
        condition: service_healthy

  mongodb:
    image: mongo:8.0
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MONGODB_DB: ${DB_DATABASE}
      MONGODB_USER: ${DB_USERNAME}
      MONGODB_PASS: ${DB_PASSWORD}
      MONGO_INITDB_DATABASE: ${DB_ROOT_DATABASE}
    networks:
      - default
      - webgateway
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 30s
    volumes:
      - mongodb:/data/db
      - ./database/init.sh:/docker-entrypoint-initdb.d/init.sh:ro

  mongo-express:
    image: mongo-express
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${DB_ROOT_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${DB_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_URL: ${DB_ROOT_URI}
    labels:
      - traefik.enable=true
      - traefik.http.routers.emoji-db.rule=Host(`emoji-db.${DOMAIN}`)
      - traefik.http.routers.emoji-db.entrypoints=websecure
      - traefik.http.routers.emoji-db.tls=true
      - traefik.docker.network=webgateway
    networks:
      - webgateway
      - default
    depends_on:
      mongodb:
        condition: service_healthy

networks:
  webgateway:
    external: true

volumes:
  mongodb:
    driver: local
  laravel-storage-production:
    driver: local
  laravel-public-assets:
    driver: local
