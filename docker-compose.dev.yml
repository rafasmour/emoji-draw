x-php-build: &php-build
  image: emoji-draw-php-fpm:development
  build:
    context: .
    dockerfile: ./docker/common/php-fpm/Dockerfile
    target: development
    args:
      UID: ${UID:-1000}
      GID: ${GID:-1000}
      XDEBUG_ENABLED: ${XDEBUG_ENABLED:-true}
      XDEBUG_MODE: develop,coverage,debug,profile
      XDEBUG_HOST: ${XDEBUG_HOST:-host.docker.internal}
      XDEBUG_IDE_KEY: ${XDEBUG_IDE_KEY:-DOCKER}
      XDEBUG_LOG: /dev/stdout
      XDEBUG_LOG_LEVEL: 0
  depends_on:
    mongodb:
      condition: service_healthy

services:
  web:
    image: nginx:latest
    restart: unless-stopped
    volumes:
      - ./:/var/www
      - ./docker/development/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    environment:
      - NGINX_HOST="emoji-draw.${DOMAIN}"
    networks:
      - webgateway
    labels:
      - traefik.enable=true
      - traefik.http.routers.web.rule=Host(`emoji-draw.${DOMAIN}`)
      - traefik.http.routers.web.entrypoints=websecure
      - traefik.http.routers.web.tls=true
      - traefik.http.routers.web.priority=1
    depends_on:
      php-fpm:
        condition: service_started

  reverb:
    <<: *php-build
    restart: unless-stopped
    command: php artisan reverb:start --debug
    env_file:
      - .env
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "8080"
    networks:
      - webgateway
    labels:
      - traefik.enable=true
      - traefik.http.routers.reverb.rule=Host(`emoji-draw.${DOMAIN}`) && PathPrefix(`/app`)
      - traefik.http.routers.reverb.priority=10
      - traefik.http.routers.reverb.entrypoints=websecure
      - traefik.http.routers.reverb.tls=true
      - traefik.http.services.reverb.loadbalancer.server.port=8080
      - traefik.docker.network=webgateway
    volumes:
      - ./:/var/www

  queue:
    <<: *php-build
    restart: unless-stopped
    command: php artisan queue:listen --tries=3
    env_file:
      - .env
    user: "${UID:-1000}:${GID:-1000}"
    networks:
      - webgateway
    volumes:
      - ./:/var/www

  vite:
    <<: *php-build
    restart: unless-stopped
    command: npm run dev
    env_file:
      - .env
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "80"
    labels:
      - traefik.enable=true
      - traefik.http.routers.vite.rule=Host(`emoji-draw.${DOMAIN}`) && PathPrefix(`/vite`)
      - traefik.http.routers.vite.entrypoints=websecure
      - traefik.http.routers.vite.tls=true
      - traefik.http.services.vite.loadbalancer.server.port=80
      - traefik.docker.network=webgateway
    networks:
      - webgateway
    volumes:
      - ./:/var/www

  php-fpm:
    <<: *php-build
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "9000"
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ./:/var/www
    networks:
      - webgateway


  workspace:
    build:
      context: .
      dockerfile: ./docker/development/workspace/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
        XDEBUG_ENABLED: ${XDEBUG_ENABLED:-true}
        XDEBUG_MODE: develop,coverage,debug,profile
        XDEBUG_HOST: ${XDEBUG_HOST:-host.docker.internal}
        XDEBUG_IDE_KEY: ${XDEBUG_IDE_KEY:-DOCKER}
        XDEBUG_LOG: /dev/stdout
        XDEBUG_LOG_LEVEL: 0
    restart: unless-stopped
    tty: true
    stdin_open: true
    env_file:
      - .env
    volumes:
      - ./:/var/www
    networks:
      - webgateway

  mongodb:
    image: mongo:8.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MONGODB_DB: ${DB_DATABASE}
      MONGODB_USER: ${DB_USERNAME}
      MONGODB_PASS: ${DB_PASSWORD}
      MONGO_INITDB_DATABASE: ${DB_ROOT_DATABASE}
    ports:
      - "${DB_PORT}"
    networks:
      - default
      - webgateway
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 30s
    volumes:
      - mongodb:/data/db
      - ./database/init.sh:/docker-entrypoint-initdb.d/init.sh:ro

  mongo-express:
    image: mongo-express
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${DB_ROOT_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${DB_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_URL: ${DB_ROOT_URI}
    labels:
      - traefik.enable=true
      - traefik.http.routers.emoji-db.rule=Host(`emoji-db.${DOMAIN}`)
      - traefik.http.routers.emoji-db.entrypoints=websecure
      - traefik.http.routers.emoji-db.tls=true
      - traefik.docker.network=webgateway
    networks:
      - webgateway
      - default
    depends_on:
      mongodb:
        condition: service_healthy

networks:
  webgateway:
    external: true

volumes:
  mongodb:
    driver: local
